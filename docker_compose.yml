version: '3.8'

services:
  # Service untuk Aplikasi PHP (Dynamic App)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kerudung_app
    restart: always
    volumes:
      - ./dynamic-app:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=sitimalikha19
      - DB_PASSWORD=secretpass
      - DB_NAME=kerudung_db
    depends_on:
      - db

  # Service untuk Web Server (Nginx)
  nginx:
    image: nginx:alpine
    container_name: kerudung_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./dynamic-app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./static-cv:/var/www/static-cv
    depends_on:
      - app

  # Service untuk Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: kerudung_db
    restart: always
    environment:
      - POSTGRES_USER=sitimalikha19
      - POSTGRES_PASSWORD=secretpass
      - POSTGRES_DB=kerudung_db
    ports:
      - "5432:5432"
    volumes:
      - ./database/uas_db.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: