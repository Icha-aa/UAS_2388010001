server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache aset statis
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|heic|webp)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}
